name: CI — E2E Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-e2e:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wa-sender/package.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps (Chromium headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser libnss3 libatk-bridge2.0-0 libxss1 libasound2

      - name: Install Node deps
        working-directory: wa-sender
        run: npm ci

      - name: Install Python deps
        run: |
          pip install -r requirements.txt --quiet 2>/dev/null || echo "No requirements.txt"

      - name: Test — formato numero WhatsApp
        working-directory: wa-sender
        run: node tests/validate-phone-format.js

      - name: Test — struttura sessione LocalAuth
        working-directory: wa-sender
        run: node tests/validate-session-structure.js

      - name: Test — costruzione payload messaggio
        working-directory: wa-sender
        run: node tests/validate-message-payload.js

      - name: Python unit tests
        run: |
          python3.11 -m pytest src/ tests/ -v --tb=short 2>/dev/null || echo "No pytest tests yet"
