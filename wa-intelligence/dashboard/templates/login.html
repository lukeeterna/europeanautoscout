<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ARGOS Dashboard - Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D0D0D' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' font-weight='700' fill='%23B8960C'>A</text></svg>"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css"/>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
  <link rel="stylesheet" href="/static/css/argos-theme.css"/>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-title">ARGOS</div>
      <p style="text-align:center; color: var(--tblr-muted); font-size: 0.8rem; margin-bottom: 1.5rem;">
        Vehicle Sourcing Intelligence
      </p>

      {% if error %}
      <div class="alert alert-danger" style="background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.3); color: var(--argos-danger); font-size: 0.85rem;">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label" style="color: var(--tblr-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">
            Password
          </label>
          <input type="password"
                 name="password"
                 class="form-control"
                 placeholder="Inserisci password"
                 autofocus
                 required/>
        </div>
        <button type="submit" class="btn btn-argos w-100">
          Accedi
        </button>
      </form>
    </div>
  </div>
</body>
</html>
