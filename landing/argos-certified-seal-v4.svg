<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="ring-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbb85c"/>
      <stop offset="50%" stop-color="#c8a446"/>
      <stop offset="100%" stop-color="#8c6e28"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="150" cy="150" r="130"/>
    </clipPath>
  </defs>

  <!-- Tutto clippato dentro il cerchio -->
  <g clip-path="url(#circle-clip)">

    <!-- Background nero -->
    <circle cx="150" cy="150" r="130" fill="#0a0a0c"/>

    <!-- EUROPEAN VEHICLE INTELLIGENCE — arco superiore -->
    <path id="top-arc" d="M 40,150 A 110,110 0 0,1 260,150" fill="none"/>
    <text font-family="Arial, Helvetica, sans-serif" font-size="9.5" fill="#c8a446" letter-spacing="2" text-anchor="middle" opacity=".85">
      <textPath href="#top-arc" startOffset="50%">EUROPEAN VEHICLE INTELLIGENCE</textPath>
    </text>

    <!-- AMSTERDAM · EST. 2024 — arco inferiore -->
    <path id="bot-arc" d="M 40,150 A 110,110 0 0,0 260,150" fill="none"/>
    <text font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#c8a446" letter-spacing="2.5" text-anchor="middle" opacity=".7">
      <textPath href="#bot-arc" startOffset="50%">AMSTERDAM  ·  EST. 2024</textPath>
    </text>

    <!-- Scudo centrale -->
    <path d="M150 75 L190 93 L190 130 C190 152 172 168 150 178 C128 168 110 152 110 130 L110 93 Z"
          fill="rgba(200,164,70,.05)" stroke="#c8a446" stroke-width="1.2" opacity=".6"/>

    <!-- A dentro lo scudo -->
    <text x="150" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="bold" fill="#c8a446" text-anchor="middle">A</text>

    <!-- Linea divisoria -->
    <line x1="75" y1="192" x2="225" y2="192" stroke="#c8a446" stroke-width=".6" opacity=".5"/>
    <circle cx="75" cy="192" r="1.8" fill="#c8a446" opacity=".4"/>
    <circle cx="225" cy="192" r="1.8" fill="#c8a446" opacity=".4"/>

    <!-- CERTIFIED -->
    <text x="150" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="7">CERTIFIED</text>

    <!-- ™ -->
    <text x="222" y="208" font-family="Arial, sans-serif" font-size="7" fill="#c8a446" opacity=".6">™</text>

  </g>

  <!-- Anelli FUORI dal clip (sopra tutto) -->
  <!-- Anello esterno dorato spesso -->
  <circle cx="150" cy="150" r="138" fill="none" stroke="url(#ring-gold)" stroke-width="3"/>

  <!-- Anello interno sottile -->
  <circle cx="150" cy="150" r="132" fill="none" stroke="#c8a446" stroke-width=".5" opacity=".35"/>

  <!-- Separatori laterali (diamanti) -->
  <polygon points="18,150 22,146 26,150 22,154" fill="#c8a446" opacity=".5"/>
  <polygon points="274,150 278,146 282,150 278,154" fill="#c8a446" opacity=".5"/>

</svg>
