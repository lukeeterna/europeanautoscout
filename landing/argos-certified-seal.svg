<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a"/>
      <stop offset="40%" style="stop-color:#c8a446"/>
      <stop offset="100%" style="stop-color:#9a7a30"/>
    </linearGradient>
    <linearGradient id="inner-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111114"/>
      <stop offset="100%" style="stop-color:#08080a"/>
    </linearGradient>
  </defs>

  <!-- Anello esterno dorato -->
  <circle cx="100" cy="100" r="96" fill="url(#gold-ring)"/>

  <!-- Anello nero (crea il ring effect) -->
  <circle cx="100" cy="100" r="88" fill="url(#inner-bg)"/>

  <!-- Anello dorato interno sottile -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#c8a446" stroke-width=".5" stroke-opacity=".5"/>

  <!-- Testo circolare superiore: EUROPEAN VEHICLE INTELLIGENCE -->
  <path id="upper-text-path" d="M 100,100 m -62,0 a 62,62 0 1,1 124,0" fill="none"/>
  <text font-family="'DM Mono', 'Courier New', monospace" font-size="6.5" fill="#c8a446" letter-spacing="3.5" text-anchor="middle">
    <textPath href="#upper-text-path" startOffset="50%">EUROPEAN VEHICLE INTELLIGENCE</textPath>
  </text>

  <!-- Testo circolare inferiore: PROTOCOLLO ARGOS™ -->
  <path id="lower-text-path" d="M 38,100 a 62,62 0 0,0 124,0" fill="none"/>
  <text font-family="'DM Mono', 'Courier New', monospace" font-size="6.8" fill="#c8a446" letter-spacing="3" text-anchor="middle">
    <textPath href="#lower-text-path" startOffset="50%">PROTOCOLLO ARGOS</textPath>
  </text>

  <!-- Separatori decorativi (stelline sui lati) -->
  <circle cx="38" cy="100" r="2" fill="#c8a446" opacity=".7"/>
  <circle cx="162" cy="100" r="2" fill="#c8a446" opacity=".7"/>

  <!-- Centro: A grande -->
  <text x="100" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#c8a446" text-anchor="middle" dominant-baseline="auto">A</text>

  <!-- Linea divisoria sotto la A -->
  <line x1="66" y1="97" x2="134" y2="97" stroke="#c8a446" stroke-width=".7" stroke-opacity=".8"/>
  <circle cx="66" cy="97" r="1.2" fill="#c8a446" opacity=".6"/>
  <circle cx="134" cy="97" r="1.2" fill="#c8a446" opacity=".6"/>

  <!-- CERTIFIED -->
  <text x="100" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="5">CERTIFIED</text>

  <!-- Score placeholder -->
  <text x="100" y="134" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#c8a446" text-anchor="middle" letter-spacing="2" opacity=".8">SCORE ≥ 75 / 100</text>

  <!-- Anello più esterno decorativo sottilissimo -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#c8a446" stroke-width=".3" stroke-opacity=".3"/>

</svg>
